version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: noterx-backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      # Mount data folder for persistence (SQLite database, markdown memory, video caches)
      - ./backend/data:/workspace/backend/data
      # Mount cookies.txt for scraper auth
      - ./cookies.txt:/workspace/backend/cookies.txt
    env_file:
      # Load ALL env vars from root .env directly into the container environment
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
      # Explicitly override to ensure cookie file path is correct inside container
      - DOUYIN_COOKIE_FILE=cookies.txt
      # Use Hugging Face mirror to prevent network unreachable errors when downloading whisper models
      - HF_ENDPOINT=https://hf-mirror.com
